name: PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: main

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - tool: bssg
          - tool: foto
            cargo-flags: --no-default-features

    steps:
    - uses: actions/checkout@v6

    - name: Validate ${{ matrix.tool }}
      uses: ./.github/actions/validate-crate
      with:
        working-directory: ./tools/${{ matrix.tool }}
        cargo-flags: ${{ matrix.cargo-flags }}

  set-status:
    runs-on: ubuntu-latest
    needs: validate
    if: always()

    steps:
    - name: Set Validated status
      uses: myrotvorets/set-commit-status-action@v2.0.1
      with:
        status: ${{ needs.validate.result == 'success' && 'success' || 'failure' }}
        context: Validated
        token: ${{ secrets.GITHUB_TOKEN }}
