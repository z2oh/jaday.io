name: Validate Crate
description: Build and test a Rust crate

inputs:
  working-directory:
    description: Path to the crate directory
    required: true
  cargo-flags:
    description: Additional flags to pass to cargo commands
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Build
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "::group::Fetch dependencies"
        cargo fetch
        echo "::endgroup::"
        echo "::group::Compile"
        cargo build ${{ inputs.cargo-flags }}
        echo "::endgroup::"
      shell: bash

    - name: Test
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "::group::Compile and run tests"
        cargo test ${{ inputs.cargo-flags }}
        echo "::endgroup::"
      shell: bash
